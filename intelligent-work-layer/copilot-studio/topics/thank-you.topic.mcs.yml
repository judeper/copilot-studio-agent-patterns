# Name: Thank you
# This topic triggers when the user says thank you.
kind: AdaptiveDialog
managedProperties:
  isCustomizable: false
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Thank you
    modelDescription: "Handles expressions of gratitude and appreciation from the user"
    includeInOnSelectIntent: false
    triggerQueries:
      - thanks
      - thank you
      - thanks so much
      - ty
      - appreciate it
      - thanks a lot
      - much appreciated

  actions:
    - kind: SendActivity
      id: sendMessage_9iz6v7
      activity: You're welcome.
