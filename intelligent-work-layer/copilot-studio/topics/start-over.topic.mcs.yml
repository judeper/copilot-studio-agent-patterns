# Name: Start Over
kind: AdaptiveDialog
managedProperties:
  isCustomizable: false
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Start Over
    modelDescription: "Resets the current conversation when the user wants to start fresh or begin again"
    includeInOnSelectIntent: false
    triggerQueries:
      - let's begin again
      - start over
      - start again
      - restart
      - begin fresh
      - reset
      - new conversation

  actions:
    - kind: Question
      id: question_zguoVV
      alwaysPrompt: false
      variable: init:Topic.Confirm
      prompt: Are you sure you want to restart the conversation?
      entity: BooleanPrebuiltEntity

    - kind: ConditionGroup
      id: conditionGroup_lvx2zV
      conditions:
        - id: conditionItem_sVQtHa
          condition: =Topic.Confirm = true
          actions:
            - kind: BeginDialog
              id: 0YKYsy
              dialog: template-content.topic.ResetConversation

      elseActions:
        - kind: SendActivity
          id: sendMessage_lk2CyQ
          activity: Ok. Let's carry on.
