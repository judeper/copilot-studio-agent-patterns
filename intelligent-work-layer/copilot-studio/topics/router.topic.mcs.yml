# Name: Router
# Classifies the user's natural language command into a domain intent.
# Invoked by the Orchestrator topic to dispatch commands to the correct domain agent.
# Returns structured JSON with intent, domain, confidence, and extracted parameters.
# Invocation: API-only — no user-facing triggers
kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: USER_COMMAND
    description: The user's natural language command text
    shouldPromptUser: false

  - kind: AutomaticTaskInput
    propertyName: CONVERSATION_HISTORY
    description: JSON array of prior turns in this session, or null if no prior context
    shouldPromptUser: false

  - kind: AutomaticTaskInput
    propertyName: USER_CONTEXT
    description: "Comma-separated string: display name, job title, department, org level"
    shouldPromptUser: false

beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: InvokeAIBuilderModelAction
      id: invokeAIBuilderModelAction_Router
      input: {}
      output:
        binding:
          predictionOutput: Topic.GeneratedJSON
      aIModelId: "{{ROUTER_MODEL_GUID}}"

    - kind: SetVariable
      id: setVariable_RouterResponse
      variable: Topic.RouterResponseJSON
      value: =Topic.GeneratedJSON.text

    - kind: EndDialog
      id: endDialog_Router

inputType:
  properties:
    USER_COMMAND:
      displayName: USER_COMMAND
      description: The user's natural language command text
      type: String

    CONVERSATION_HISTORY:
      displayName: CONVERSATION_HISTORY
      description: JSON array of prior turns in this session, or null if no prior context
      type: String

    USER_CONTEXT:
      displayName: USER_CONTEXT
      description: "Comma-separated string: display name, job title, department, org level"
      type: String

outputType:
  properties:
    RouterResponseJSON:
      displayName: RouterResponseJSON
      description: "JSON with intent (verb-noun phrase), domain (EMAIL|CALENDAR|TASK|SEARCH|DELEGATION|CARD_MANAGEMENT|SETTINGS|UNKNOWN), confidence (0-100), and extracted_params (target_entity, temporal_ref, secondary_intent)"
      type: String
