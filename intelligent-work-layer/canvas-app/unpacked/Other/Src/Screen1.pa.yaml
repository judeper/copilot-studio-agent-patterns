Screens:
  Screen1:
    Properties:
      Fill: =RGBA(250, 250, 248, 1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)

    Children:
      - lblTitle:
          Control: Label
          Properties:
            Text: ="Intelligent Work Layer"
            X: =20
            Y: =5
            Width: =400
            Height: =32
            Size: =16
            FontWeight: =FontWeight.Bold
            Color: =RGBA(50, 50, 50, 1)

      - drpTriggerType:
          Control: DropDown
          Properties:
            Items: =["", "EMAIL", "TEAMS_MESSAGE", "CALENDAR_SCAN"]
            X: =20
            Y: =40
            Width: =260
            Height: =36

      - drpPriority:
          Control: DropDown
          Properties:
            Items: =["", "High", "Medium", "Low"]
            X: =300
            Y: =40
            Width: =220
            Height: =36

      - drpCardStatus:
          Control: DropDown
          Properties:
            Items: =["", "READY", "LOW_CONFIDENCE", "SUMMARY_ONLY"]
            X: =540
            Y: =40
            Width: =240
            Height: =36

      - drpTemporalHorizon:
          Control: DropDown
          Properties:
            Items: =["", "TODAY", "THIS_WEEK", "NEXT_WEEK", "BEYOND"]
            X: =800
            Y: =40
            Width: =240
            Height: =36
